# Sculk Spread — Block Plague Mod

Mod na **Minecraft 1.21.1 (Fabric)** inspirowany filmem *„I made blocks spread like sculk”* od **Element X**.
Dowolny blok (lub wszystkie naraz) zaczyna „infekować” sąsiadów — zamieniając ich w siebie. Można sterować
prędkością, promieniem, włączać tryb chaosu, „walki cieczy”, tory w 3D itd.

---

## ⚙️ Budowanie pliku `.jar`

**Wymagania:** JDK 21 (np. Temurin 21), połączenie z internetem (Gradle pobierze Fabric Loom).

### Windows
```bat
cd sculkspread
gradlew.bat build
```

### Linux / macOS
```bash
cd sculkspread
chmod +x gradlew
./gradlew build
```

Gotowy `.jar` znajdziesz w:
```
sculkspread/build/libs/sculkspread-1.0.0.jar
```

> ⚠️ Repo zawiera tylko `gradle-wrapper.properties`. Pełny wrapper (`gradlew`, `gradlew.bat`, `gradle-wrapper.jar`) wygeneruje się przy pierwszym uruchomieniu Gradle — wystarczy mieć Gradle 8+ globalnie zainstalowany albo uruchom raz `gradle wrapper` w folderze projektu. Alternatywnie skopiuj wrapper z dowolnego istniejącego projektu Fabric.

