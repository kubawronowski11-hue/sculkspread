## 🧪 Scenariusze z filmu — gotowe presety

**Andezyt kontra Dioryt (00:19):**
```
/sculkspread add minecraft:andesite
/sculkspread add minecraft:diorite
/sculkspread speed 50
```

**Piasek pożera świat (01:02):**
```
/sculkspread add minecraft:sand
/sculkspread speed 100
```

**Domek osadników w wodę (02:47):**
```
/sculkspread add minecraft:water
/sculkspread speed 200
```

**Woda vs Lawa bez obsydianu (03:31):**
```
/sculkspread add minecraft:water
/sculkspread add minecraft:lava
/sculkspread waterlava false
/sculkspread speed 100
```

**Rollercoastery 3D (04:54):**
```
/sculkspread add minecraft:rail
/sculkspread rails3d true
/sculkspread speed 500
```

**Powietrze zjada świat (07:38):**
```
/sculkspread add minecraft:air
/sculkspread speed 1000
```

**Totalny chaos — końcówka filmu (08:59):**
```
/sculkspread all true
/sculkspread speed 5000
/sculkspread radius 128
```

> 💡 Bedrock jest chroniony przed infekcją (żeby nie zniszczyć świata kompletnie). Możesz to zmienić w `SpreadEngine.canInfect`.

---

## 🐞 Limity / znane „cechy”

- Powietrze i ciecze działają trochę inaczej niż bloki stałe — silnik traktuje je specjalnie.
- Bardzo duże wartości `speed` + duży `radius` = lagi (jak w filmie 😄).
- Mod nie zapisuje konfiguracji na dysk — po restarcie wpisz komendy ponownie. (Łatwo dodać, daj znać.)
- Operacje na blokach są strumieniowane w wątku głównym serwera — bezpieczne, ale przy `speed > 20000` chunk tick może trwać kilka ms.

