## 📥 Instalacja w **Feather Launcher** (i każdym innym)

1. Zainstaluj **Fabric Loader** dla Minecrafta **1.21.1**:
   - W Feather: utwórz instancję 1.21.1 → wybierz „Fabric” jako modloader.
   - Lub pobierz instalator z https://fabricmc.net/use/installer.
2. Pobierz **Fabric API 0.102.1+1.21.1** (lub nowsze do 1.21.1) z https://modrinth.com/mod/fabric-api.
3. Otwórz folder modów instancji w Feather: prawym na instancję → **Open mods folder**.
4. Wrzuć do tego folderu:
   - `sculkspread-1.0.0.jar`
   - `fabric-api-*.jar`
5. Uruchom grę. W menu czatu wpisz `/sculkspread` żeby zobaczyć autouzupełnianie.

