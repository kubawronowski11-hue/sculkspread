## 🎮 Komendy (wymagają OP / permission level 2)

| Komenda | Co robi |
|---|---|
| `/sculkspread add <block>` | Dodaje blok do listy infekujących. Przykład: `/sculkspread add minecraft:sand` |
| `/sculkspread remove <block>` | Usuwa blok z listy. |
| `/sculkspread list` | Pokazuje aktualne bloki infekujące. |
| `/sculkspread clear` | Czyści listę i wyłącza tryb chaosu. |
| `/sculkspread speed <0–200000>` | Prób infekcji na chunk/tick. Domyślnie `4`. Element X w filmie podkręca do 5000–20000 (wtedy SOLIDNE lagi). |
| `/sculkspread radius <0–4096>` | Promień (w blokach) wokół graczy, w którym silnik pracuje. `0` = brak limitu. Domyślnie `64`. |
| `/sculkspread all <true\|false>` | Tryb chaosu — **WSZYSTKIE** bloki infekują (jak w końcówce filmu). |
| `/sculkspread rails3d <true\|false>` | Tory mogą nadpisywać dowolne bloki, w tym powietrze (rollercoaster 3D). |
| `/sculkspread waterlava <true\|false>` | `true` = vanilla (obsydian/bruk). `false` = ciecze walczą o teren, jak w filmie (03:31). |

